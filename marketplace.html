<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coding Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }
    .hero {
      background: #1e1e2f;
      color: white;
      padding: 60px 0;
      text-align: center;
    }
    .product-card {
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border: none;
      transition: transform 0.2s;
    }
    .product-card:hover {
      transform: scale(1.03);
    }
    .footer {
      background: #222;
      color: #aaa;
      padding: 30px 0;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">FASHA MARKET SHOP</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Browse</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Sell Code</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="container">
      <h1>ANEKA MACAM BOLA</h1>
      <p>Barang Produk Dalam Negeri Kualitas Eksport.</p>
      <a href="#" class="btn btn-primary mt-3">Start Browsing</a>
    </div>
  </section>

  <!-- Products Section -->
  <section class="py-5">
    <div class="container">
      <h2 class="mb-4 text-center">Popular Listings</h2>
      <div class="row g-4">
        <!-- Product 1 -->
        <div class="col-md-4">
          <div class="card product-card">
            <p>
				<img src="bola1.png" />
			</p>
            <div class="card-body">
              <h5 class="card-title">Bola Futsal</h5>
              <p class="card-text">Rp.80.000</p>
              <a href="#" class="btn btn-outline-primary btn-sm">View</a>
            </div>
          </div>
        </div>
        <!-- Product 2 -->
        <div class="col-md-4">
          <div class="card product-card">
             <p>
				<img src="bola2.jpeg" />
			</p>
            <div class="card-body">
              <h5 class="card-title">Bola Volley</h5>
              <p class="card-text">Rp. 85.000</p>
              <a href="#" class="btn btn-outline-primary btn-sm">View</a>
            </div>
          </div>
        </div>
        <!-- Product 3 -->
        <div class="col-md-4">
          <div class="card product-card">
             <p>
				<img src="bola3.jpeg" />
			</p>
            <div class="card-body">
              <h5 class="card-title">Bola Basket</h5>
              <p class="card-text">Rp. 80.000</p>
              <a href="#" class="btn btn-outline-primary btn-sm">View</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2020 FashaMarket. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
